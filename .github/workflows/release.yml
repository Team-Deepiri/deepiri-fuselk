name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  SKIP_FETCH: '1'
  QTWEBENGINE_DISABLE_SANDBOX: '1'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libegl1 libgl1 libnss3 libasound2 libpulse0 fuse libfuse2 \
            file desktop-file-utils

      - name: Build Linux AppImage
        run: bash scripts/ci/build-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/Fuselk-latest.AppImage
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build macOS DMG
        run: bash scripts/ci/build-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/Fuselk-latest.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Windows installer
        run: bash scripts/ci/build-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/Fuselk-latest-setup.exe
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux/Fuselk-latest.AppImage
            artifacts/macos/Fuselk-latest.dmg
            artifacts/windows/Fuselk-latest-setup.exe
