name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check src tests
      - name: Ruff format check
        run: poetry run ruff format --check src tests
      - name: Mypy
        run: poetry run mypy src/deepiri_fuselk

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests
        run: poetry run pytest tests/ -m "not slow and not gpu" --cov=deepiri_fuselk --cov-report=xml -q
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  benchmark:
    name: Benchmark Suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run benchmark
        run: poetry run python scripts/benchmark.py --physics --helix --twin --reactor --twin-steps 20 --reactor-steps 20

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deployment/Dockerfile -t deepiri-fuselk:ci .
      - name: Smoke test
        run: |
          docker run --rm deepiri-fuselk:ci python -c "
          from deepiri_fuselk.physics import solve_oil_water_steady
          r = solve_oil_water_steady(n_grid=16)
          print('ok', r.converged)
          "
